name: 003 Deploy API to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod

env:
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
  APP_NAME: ${{ vars.APP_NAME }}

permissions:
  contents: read
  id-token: write   # required for azure/login OIDC

concurrency:
  group: deploy-api-${{ github.event.inputs.environment || 'dev' }}

jobs:
  build_and_deploy_api:
    name: Build and Deploy API
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish API (Release)
        run: dotnet publish src/ai-genius-api/ai-genius-api.csproj -c Release -o ./publish

      - name: Zip publish output
        run: cd publish && zip -r ../publish.zip .

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.APP_SERVICE_NAME }}
          package: ./publish.zip