name: 002 Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  APP_NAME: ${{ vars.APP_NAME }}

jobs:
  build-and-deploy:
    name: Build and Deploy Web
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/ai-genius-web/package-lock.json

      - name: Install dependencies
        working-directory: src/ai-genius-web
        run: npm ci

      - name: Build
        working-directory: src/ai-genius-web
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Static Web Apps
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: upload
          app_location: src/ai-genius-web/dist
          output_location: ""
          skip_app_build: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

      - name: Write deployment summary
        run: |
          echo "Deployed ${{ env.APP_NAME }} to ${{ env.ENVIRONMENT }} - URL: ${{ steps.swa.outputs.static_web_app_url }}" >> $GITHUB_STEP_SUMMARY
